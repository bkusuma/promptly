<section class="search-section" aria-label="Search prompts">
  <form
    class="search-form"
    role="search"
    action="{{ '/search/' | relative_url }}"
    method="get"
    id="search-form"
    autocomplete="off"
  >
    <label class="search-form__label" for="search-input">Search prompts</label>
    <div class="search-form__row">
      <input
        id="search-input"
        class="search-form__input"
        type="search"
        name="q"
        placeholder="Search by title, model, or tag…"
        aria-label="Search query"
        value="{{ page.query | escape }}"
        maxlength="120"
      >
      <button class="search-form__btn" type="submit" aria-label="Submit search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true" focusable="false">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
    </div>
    <div id="search-results" class="search-results" aria-live="polite" aria-atomic="true" role="region" aria-label="Search results"></div>
  </form>
</section>
