<header class="site-header" role="banner">
  <div class="site-header__inner container">
    <a class="site-header__logo" href="{{ '/' | relative_url }}" aria-label="{{ site.title }} — home">
      <span class="logo-mark" aria-hidden="true">&#x25B6;</span>
      <span class="logo-text">{{ site.title }}</span>
    </a>

    <button
      class="nav-toggle"
      aria-expanded="false"
      aria-controls="primary-nav"
      aria-label="Toggle navigation"
    >
      <span class="nav-toggle__bar"></span>
      <span class="nav-toggle__bar"></span>
      <span class="nav-toggle__bar"></span>
    </button>

    <nav id="primary-nav" class="primary-nav" aria-label="Primary navigation">
      <ul class="primary-nav__list" role="list">
        <li><a href="{{ '/' | relative_url }}" {% if page.url == '/' %}aria-current="page"{% endif %}>Timeline</a></li>
        <li><a href="{{ '/search/' | relative_url }}" {% if page.url contains '/search' %}aria-current="page"{% endif %}>Search</a></li>
        <li><a href="{{ '/about/' | relative_url }}" {% if page.url contains '/about' %}aria-current="page"{% endif %}>About</a></li>
      </ul>
    </nav>
  </div>
</header>
