<div class="theme-switcher" aria-label="Theme switcher" role="group">
  <button
    class="theme-btn"
    data-theme="cosmic"
    aria-label="Cosmic Dark theme"
    title="Cosmic Dark"
  >
    <span class="theme-btn__swatch theme-btn__swatch--cosmic" aria-hidden="true"></span>
  </button>
  <button
    class="theme-btn"
    data-theme="parchment"
    aria-label="Parchment Light theme"
    title="Parchment Light"
  >
    <span class="theme-btn__swatch theme-btn__swatch--parchment" aria-hidden="true"></span>
  </button>
  <button
    class="theme-btn"
    data-theme="terminal"
    aria-label="Terminal Green theme"
    title="Terminal Green"
  >
    <span class="theme-btn__swatch theme-btn__swatch--terminal" aria-hidden="true"></span>
  </button>
</div>
